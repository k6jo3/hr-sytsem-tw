server {
    listen       80;
    server_name  localhost;

    # ==========================================
    # Gzip 壓縮設定
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ==========================================
    # 靜態資源快取
    # ==========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ==========================================
    # API 反向代理 — 透過 Gateway 路由到各微服務
    # ==========================================
    location /api/ {
        proxy_pass http://hrms-gateway:8080;
        # Azure Container Apps 的 ingress proxy 根據 Host header 路由
        proxy_set_header Host hrms-gateway;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 清掉 Origin header 避免 Gateway CORS filter 誤判
        # （nginx server-side proxy 不需要 CORS）
        proxy_set_header Origin "";

        # WebSocket 支援（通知服務用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 逾時設定
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # SPA Fallback — React Router 支援
    # ==========================================
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 健康檢查端點
    location /health {
        access_log off;
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
    }

    # 禁止存取隱藏檔案
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

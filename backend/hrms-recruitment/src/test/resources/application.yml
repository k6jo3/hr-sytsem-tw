spring:
  application:
    name: hrms-recruitment-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379
server:
  port: 0
eureka:
  client:
    enabled: false

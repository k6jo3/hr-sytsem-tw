server:
  port: 8081

spring:
  application:
    name: hrms-iam-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hrms_iam
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.company.hrms.iam.infrastructure.po
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    enabled: false  # 開發環境暫時停用
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.company.hrms: DEBUG
    org.springframework.web: INFO

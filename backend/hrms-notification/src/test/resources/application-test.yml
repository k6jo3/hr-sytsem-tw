spring:
  application:
    name: hrms-notification-test
  
  datasource:
    url: jdbc:h2:mem:hrms_notification_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: hrms-notification-test-group
      auto-offset-reset: earliest
    # 測試時可能需要 Mock Kafka 或接受連線失敗

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    com.company.hrms.notification: DEBUG
    
security:
  jwt:
    secret: "testSecretKeyForJwtTokenGenerationWhichNeedsToBeLongEnough"
    expiration: 3600

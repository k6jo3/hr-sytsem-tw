spring:
  application:
    name: hrms-notification
  
  datasource:
    url: jdbc:postgresql://localhost:5433/hrms_notification
    username: hrms_user
    password: hrms_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: hrms-notification-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  
  redis:
    host: localhost
    port: 6379

  # Email SMTP 配置（正式環境請替換為實際 SMTP 伺服器）
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Email 通道配置
hrms:
  notification:
    channel:
      email:
        enabled: ${EMAIL_CHANNEL_ENABLED:true}
        from: ${EMAIL_FROM:noreply@hrms.local}

server:
  port: 8092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.company.hrms.notification.infrastructure.po
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator 可觀測性配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  health:
    diskspace:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true

logging:
  level:
    com.company.hrms.notification: DEBUG
    org.springframework.web: INFO

# HRMS Azure CD Pipeline
# 從 ghcr.io 拉取 image 部署到 Azure Container Apps（不需要 ACR）
#
# 前置條件：
#   1. ci-cd.yml 已成功推送 image 到 ghcr.io
#   2. GitHub Secrets 設定：AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_CAE_NAME
#
# 觸發方式：手動（workflow_dispatch）
name: Azure CD

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CAE_NAME: ${{ secrets.AZURE_CAE_NAME }}

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 部署所有後端微服務
      - name: Deploy backend services
        run: |
          SERVICES=(hrms-iam hrms-organization hrms-attendance hrms-payroll hrms-insurance hrms-project hrms-timesheet hrms-performance hrms-recruitment hrms-training hrms-workflow hrms-notification hrms-document hrms-reporting)

          for SERVICE in "${SERVICES[@]}"; do
            echo ">>> Deploying ${SERVICE}..."
            az containerapp update \
              --name $SERVICE \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image "${{ env.REGISTRY }}/${{ env.REPO }}/${SERVICE}:latest" \
              2>/dev/null || echo "    ${SERVICE} not yet created, skipping..."
          done

      # 部署前端
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name hrms-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest" \
            2>/dev/null || echo "Frontend not yet created, skipping..."

      - name: Get frontend URL
        run: |
          FQDN=$(az containerapp show --name hrms-frontend --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "not-deployed")
          echo "Frontend URL: https://${FQDN}"

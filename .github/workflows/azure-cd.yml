# HRMS Azure CI/CD Pipeline
# 觸發：push 到 main → 建置測試 → 推送 ACR → 部署 Container Apps
name: Azure CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
  ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CAE_NAME: ${{ secrets.AZURE_CAE_NAME }}

jobs:
  # ===== 前端測試與建置 =====
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build

  # ===== 後端測試 =====
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - run: mvn test -B -q

  # ===== Docker Image 建置推送到 ACR =====
  docker-build:
    name: Build & Push to ACR
    needs: [frontend, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - hrms-iam
          - hrms-organization
          - hrms-attendance
          - hrms-payroll
          - hrms-insurance
          - hrms-project
          - hrms-timesheet
          - hrms-performance
          - hrms-recruitment
          - hrms-training
          - hrms-workflow
          - hrms-notification
          - hrms-document
          - hrms-reporting
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}

  # ===== 前端 Docker Image =====
  docker-frontend:
    name: Build Frontend Image
    needs: [frontend, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/frontend:latest
            ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}

  # ===== 部署到 Azure Container Apps =====
  deploy:
    name: Deploy to Azure
    needs: [docker-build, docker-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 更新所有後端微服務
      - name: Deploy backend services
        run: |
          SERVICES=(hrms-iam hrms-organization hrms-attendance hrms-payroll hrms-insurance hrms-project hrms-timesheet hrms-performance hrms-recruitment hrms-training hrms-workflow hrms-notification hrms-document hrms-reporting)

          for SERVICE in "${SERVICES[@]}"; do
            echo ">>> Deploying ${SERVICE}..."
            az containerapp update \
              --name $SERVICE \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image "${{ env.ACR_LOGIN_SERVER }}/${SERVICE}:${{ github.sha }}" \
              2>/dev/null || echo "    ${SERVICE} not yet created, skipping..."
          done

      # 更新前端
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name hrms-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}" \
            2>/dev/null || echo "Frontend not yet created, skipping..."

      - name: Get frontend URL
        run: |
          FQDN=$(az containerapp show --name hrms-frontend --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "not-deployed")
          echo "🌐 Frontend URL: https://${FQDN}"

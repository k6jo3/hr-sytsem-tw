# HRMS Azure CD Pipeline
# 從 ghcr.io 拉取 image 部署到 Azure Container Apps（不需要 ACR）
#
# 前置條件：
#   1. ci-cd.yml 已成功推送 image 到 ghcr.io
#   2. GitHub Secrets 設定：AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_CAE_NAME
#
# 觸發方式：CI 完成後自動部署 + 手動觸發
name: Azure CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CAE_NAME: ${{ secrets.AZURE_CAE_NAME }}

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    # workflow_dispatch 時直接跑；workflow_run 時只在 CI 成功才跑
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 為所有 Container App 設定 ghcr.io registry 認證
      - name: Configure ghcr.io registry
        run: |
          SERVICES=(hrms-postgres hrms-gateway hrms-iam hrms-organization hrms-attendance hrms-payroll hrms-insurance hrms-project hrms-timesheet hrms-performance hrms-recruitment hrms-training hrms-workflow hrms-notification hrms-document hrms-reporting hrms-frontend)
          for SERVICE in "${SERVICES[@]}"; do
            az containerapp registry set \
              --name $SERVICE \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }} \
              --output none 2>/dev/null || true
          done

      # 部署自訂 PostgreSQL（含 init script + seed data）
      - name: Deploy PostgreSQL
        run: |
          az containerapp update \
            --name hrms-postgres \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.REGISTRY }}/${{ env.REPO }}/hrms-postgres:latest" \
            --output none 2>/dev/null || echo "PostgreSQL update failed"

      # 部署 Gateway + 後端微服務
      - name: Deploy backend services
        run: |
          SERVICES=(hrms-gateway hrms-iam hrms-organization hrms-attendance hrms-payroll hrms-insurance hrms-project hrms-timesheet hrms-performance hrms-recruitment hrms-training hrms-workflow hrms-notification hrms-document hrms-reporting)

          for SERVICE in "${SERVICES[@]}"; do
            echo ">>> Deploying ${SERVICE}..."
            az containerapp update \
              --name $SERVICE \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image "${{ env.REGISTRY }}/${{ env.REPO }}/${SERVICE}:latest" \
              --output none 2>/dev/null || echo "    ${SERVICE} failed, skipping..."
          done

      # 部署前端
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name hrms-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest" \
            --output none 2>/dev/null || echo "Frontend failed, skipping..."

      - name: Get frontend URL
        run: |
          FQDN=$(az containerapp show --name hrms-frontend --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "not-deployed")
          echo "Frontend URL: https://${FQDN}"

# HRMS CI/CD Pipeline
# 觸發：push 到 main 時自動建置、測試、打包、部署
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ===== 前端測試與建置 =====
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist

  # ===== 後端測試 =====
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate toolchains.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides><version>21</version></provides>
              <configuration><jdkHome>${JAVA_HOME}</jdkHome></configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Run tests
        run: mvn test -B -q

  # ===== Docker Image 建置與推送 =====
  docker-build:
    name: Build Docker Images
    needs: [frontend, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - hrms-iam
          - hrms-organization
          - hrms-attendance
          - hrms-payroll
          - hrms-insurance
          - hrms-project
          - hrms-timesheet
          - hrms-performance
          - hrms-recruitment
          - hrms-training
          - hrms-workflow
          - hrms-notification
          - hrms-document
          - hrms-reporting
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}

  # ===== 前端 Docker Image =====
  docker-frontend:
    name: Build Frontend Image
    needs: [frontend, backend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO }}/frontend:${{ github.sha }}

  # ===== 部署到 VPS =====
  deploy:
    name: Deploy to VPS
    needs: [docker-build, docker-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/hr-system-2

            # 拉取最新設定
            git pull origin main

            # 登入 GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新 images 並重啟
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 清理舊 images
            docker image prune -f

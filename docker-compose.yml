  # ==========================================
  # 前端 — React SPA (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
    container_name: hrms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - hrms-gateway
    networks:
      - hrms-network

# ==========================================
# 網路設定
# ==========================================
networks:
  hrms-network:
    driver: bridge

# ==========================================
# 資料卷（持久化）
# ==========================================
volumes:
  postgres_data:
    name: hrms_postgres_data
  redis_data:
    name: hrms_redis_data

# ============================================================
# HRMS Docker Compose - 完整容器化部署（含 Kafka 事件驅動）
# 包含：PostgreSQL + Redis + Kafka + Gateway + 14 微服務 + 前端
#
# 使用方式：
#   啟動全部：   docker compose up -d --build
#   啟動基礎設施：docker compose up -d postgres redis kafka zookeeper
#   查看狀態：   docker compose ps
#   查看日誌：   docker compose logs -f hrms-iam
#   停止全部：   docker compose down
#   清除資料：   docker compose down -v
#
# 資源需求（含 Kafka）：約 5-6 GB RAM
# ============================================================

# 共用環境變數模板（減少重複）
x-service-common: &service-common
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 384M
  networks:
    - hrms-network

x-service-env: &service-env
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
  EUREKA_CLIENT_ENABLED: "false"
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

services:
  # ==========================================
  # 基礎設施 — PostgreSQL
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hrms_iam
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
      - ./backend/hrms-iam/src/main/resources/db/schema-local.sql:/docker-entrypoint-initdb.d/02-schema-iam.sql
      - ./docker/seed-iam.sql:/docker-entrypoint-initdb.d/03-seed-iam.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_iam"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: postgres -c max_connections=300 -c shared_buffers=64MB -c work_mem=2MB
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - hrms-network

  # ==========================================
  # 基礎設施 — Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - hrms-network

  # ==========================================
  # 基礎設施 — Zookeeper
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hrms-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - hrms-network

  # ==========================================
  # 基礎設施 — Kafka
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hrms-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - hrms-network

  # ==========================================
  # API Gateway
  # ==========================================
  hrms-gateway:
    build:
      context: ./backend
      args:
        SERVICE: hrms-gateway
    container_name: hrms-gateway
    <<: *service-common
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8080
      REDIS_HOST: redis
      EUREKA_ENABLED: "false"
      ROUTE_IAM_URI: http://hrms-iam:8081
      ROUTE_ORG_URI: http://hrms-organization:8082
      ROUTE_ATT_URI: http://hrms-attendance:8083
      ROUTE_PAY_URI: http://hrms-payroll:8084
      ROUTE_INS_URI: http://hrms-insurance:8085
      ROUTE_PROJ_URI: http://hrms-project:8086
      ROUTE_TIME_URI: http://hrms-timesheet:8087
      ROUTE_PERF_URI: http://hrms-performance:8088
      ROUTE_RECRUIT_URI: http://hrms-recruitment:8089
      ROUTE_TRAIN_URI: http://hrms-training:8090
      ROUTE_WF_URI: http://hrms-workflow:8091
      ROUTE_NOTI_URI: http://hrms-notification:8092
      ROUTE_DOC_URI: http://hrms-document:8093
      ROUTE_RPT_URI: http://hrms-reporting:8094
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================
  # HR01 IAM 認證授權服務
  # ==========================================
  hrms-iam:
    build:
      context: ./backend
      args:
        SERVICE: hrms-iam
    container_name: hrms-iam
    <<: *service-common
    ports:
      - "8081:8081"
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hrms_iam
      DB_USERNAME: hrms_user
      DB_PASSWORD: hrms_password
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  # ==========================================
  # HR02 組織員工服務
  # ==========================================
  hrms-organization:
    build:
      context: ./backend
      args:
        SERVICE: hrms-organization
    container_name: hrms-organization
    <<: *service-common
    ports:
      - "8082:8082"
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_organization
      SPRING_DATASOURCE_USERNAME: hrms_user
      SPRING_DATASOURCE_PASSWORD: hrms_password
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  # ==========================================
  # HR03~HR14 微服務（統一模式）
  # ==========================================
  hrms-attendance:
    build: { context: ./backend, args: { SERVICE: hrms-attendance } }
    container_name: hrms-attendance
    <<: *service-common
    ports: ["8083:8083"]
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_attendance
      SPRING_DATASOURCE_USERNAME: hrms_user
      SPRING_DATASOURCE_PASSWORD: hrms_password
      SPRING_REDIS_HOST: redis
    depends_on: &deps-pg-redis-kafka
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }

  hrms-payroll:
    build: { context: ./backend, args: { SERVICE: hrms-payroll } }
    container_name: hrms-payroll
    <<: *service-common
    ports: ["8084:8084"]
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_payroll
      SPRING_DATASOURCE_USERNAME: hrms_user
      SPRING_DATASOURCE_PASSWORD: hrms_password
      SPRING_REDIS_HOST: redis
    depends_on: *deps-pg-redis-kafka

  hrms-insurance:
    build: { context: ./backend, args: { SERVICE: hrms-insurance } }
    container_name: hrms-insurance
    <<: *service-common
    ports: ["8085:8085"]
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE: local,docker
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hrms_insurance
      SPRING_DATASOURCE_USERNAME: hrms_user
      SPRING_DATASOURCE_PASSWORD: hrms_password
      SPRING_REDIS_HOST: redis
      HRMS_SERVICES_ORGANIZATION_URL: http://hrms-organization:8082
    depends_on: *deps-pg-redis-kafka

  hrms-project:
    build: { context: ./backend, args: { SERVICE: hrms-project } }
    container_name: hrms-project

# HRMS Nginx 反向代理配置
# 前端 SPA + 後端 14 微服務 API 路由

upstream hrms-iam         { server hrms-iam:8081; }
upstream hrms-organization { server hrms-organization:8082; }
upstream hrms-attendance  { server hrms-attendance:8083; }
upstream hrms-payroll     { server hrms-payroll:8084; }
upstream hrms-insurance   { server hrms-insurance:8085; }
upstream hrms-project     { server hrms-project:8086; }
upstream hrms-timesheet   { server hrms-timesheet:8087; }
upstream hrms-performance { server hrms-performance:8088; }
upstream hrms-recruitment { server hrms-recruitment:8089; }
upstream hrms-training    { server hrms-training:8090; }
upstream hrms-workflow    { server hrms-workflow:8091; }
upstream hrms-notification { server hrms-notification:8092; }
upstream hrms-document    { server hrms-document:8093; }
upstream hrms-reporting   { server hrms-reporting:8094; }

server {
    listen 80;
    server_name _;

    # 安全標頭
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 壓縮
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ===== 後端 API 路由 =====

    # HR01 IAM
    location /api/v1/auth     { proxy_pass http://hrms-iam; include /etc/nginx/proxy_params; }
    location /api/v1/users    { proxy_pass http://hrms-iam; include /etc/nginx/proxy_params; }
    location /api/v1/roles    { proxy_pass http://hrms-iam; include /etc/nginx/proxy_params; }
    location /api/v1/permissions { proxy_pass http://hrms-iam; include /etc/nginx/proxy_params; }

    # HR02 Organization
    location /api/v1/employees     { proxy_pass http://hrms-organization; include /etc/nginx/proxy_params; }
    location /api/v1/organizations { proxy_pass http://hrms-organization; include /etc/nginx/proxy_params; }
    location /api/v1/departments   { proxy_pass http://hrms-organization; include /etc/nginx/proxy_params; }

    # HR03 Attendance
    location /api/v1/attendance { proxy_pass http://hrms-attendance; include /etc/nginx/proxy_params; }
    location /api/v1/leave      { proxy_pass http://hrms-attendance; include /etc/nginx/proxy_params; }
    location /api/v1/overtime   { proxy_pass http://hrms-attendance; include /etc/nginx/proxy_params; }
    location /api/v1/shifts     { proxy_pass http://hrms-attendance; include /etc/nginx/proxy_params; }

    # HR04 Payroll
    location /api/v1/payslips              { proxy_pass http://hrms-payroll; include /etc/nginx/proxy_params; }
    location /api/v1/payroll-runs          { proxy_pass http://hrms-payroll; include /etc/nginx/proxy_params; }
    location /api/v1/salary-structures     { proxy_pass http://hrms-payroll; include /etc/nginx/proxy_params; }
    location /api/v1/payroll-item-definitions { proxy_pass http://hrms-payroll; include /etc/nginx/proxy_params; }

    # HR05 Insurance
    location /api/v1/insurance { proxy_pass http://hrms-insurance; include /etc/nginx/proxy_params; }

    # HR06 Project
    location /api/v1/projects  { proxy_pass http://hrms-project; include /etc/nginx/proxy_params; }
    location /api/v1/customers { proxy_pass http://hrms-project; include /etc/nginx/proxy_params; }
    location /api/v1/tasks     { proxy_pass http://hrms-project; include /etc/nginx/proxy_params; }

    # HR07 Timesheet
    location /api/v1/timesheets { proxy_pass http://hrms-timesheet; include /etc/nginx/proxy_params; }

    # HR08 Performance
    location /api/v1/performance { proxy_pass http://hrms-performance; include /etc/nginx/proxy_params; }

    # HR09 Recruitment
    location /api/v1/recruitment { proxy_pass http://hrms-recruitment; include /etc/nginx/proxy_params; }
    location /api/v1/candidates  { proxy_pass http://hrms-recruitment; include /etc/nginx/proxy_params; }

    # HR10 Training
    location /api/v1/training { proxy_pass http://hrms-training; include /etc/nginx/proxy_params; }

    # HR11 Workflow
    location /api/v1/workflows { proxy_pass http://hrms-workflow; include /etc/nginx/proxy_params; }

    # HR12 Notification
    location /api/v1/notifications { proxy_pass http://hrms-notification; include /etc/nginx/proxy_params; }

    # HR13 Document
    location /api/v1/documents { proxy_pass http://hrms-document; include /etc/nginx/proxy_params; }

    # HR14 Reporting
    location /api/v1/reporting { proxy_pass http://hrms-reporting; include /etc/nginx/proxy_params; }

    # ===== 前端 SPA =====
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

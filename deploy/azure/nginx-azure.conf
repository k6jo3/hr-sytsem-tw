# HRMS Nginx - Azure Container Apps 版
# Container Apps 內部服務透過 internal ingress 通訊
# 內部 FQDN 格式: <app-name>.internal.<env-unique-id>.<region>.azurecontainerapps.io
#
# 注意：實際部署時需替換 INTERNAL_DOMAIN 為真實的 Container Apps 內部域名
# 可用環境變數注入或 deploy script 動態替換

# 使用 resolver 解析內部 DNS
resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name _;

    # 安全標頭
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ===== 後端 API 路由 =====
    # HR01 IAM
    location /api/v1/auth       { set $upstream hrms-iam; proxy_pass http://$upstream:8081; include /etc/nginx/proxy_params; }
    location /api/v1/users      { set $upstream hrms-iam; proxy_pass http://$upstream:8081; include /etc/nginx/proxy_params; }
    location /api/v1/roles      { set $upstream hrms-iam; proxy_pass http://$upstream:8081; include /etc/nginx/proxy_params; }
    location /api/v1/permissions { set $upstream hrms-iam; proxy_pass http://$upstream:8081; include /etc/nginx/proxy_params; }

    # HR02 Organization
    location /api/v1/employees     { set $upstream hrms-organization; proxy_pass http://$upstream:8082; include /etc/nginx/proxy_params; }
    location /api/v1/organizations { set $upstream hrms-organization; proxy_pass http://$upstream:8082; include /etc/nginx/proxy_params; }
    location /api/v1/departments   { set $upstream hrms-organization; proxy_pass http://$upstream:8082; include /etc/nginx/proxy_params; }

    # HR03 Attendance
    location /api/v1/attendance { set $upstream hrms-attendance; proxy_pass http://$upstream:8083; include /etc/nginx/proxy_params; }
    location /api/v1/leave      { set $upstream hrms-attendance; proxy_pass http://$upstream:8083; include /etc/nginx/proxy_params; }
    location /api/v1/overtime   { set $upstream hrms-attendance; proxy_pass http://$upstream:8083; include /etc/nginx/proxy_params; }
    location /api/v1/shifts     { set $upstream hrms-attendance; proxy_pass http://$upstream:8083; include /etc/nginx/proxy_params; }

    # HR04 Payroll
    location /api/v1/payslips                { set $upstream hrms-payroll; proxy_pass http://$upstream:8084; include /etc/nginx/proxy_params; }
    location /api/v1/payroll-runs            { set $upstream hrms-payroll; proxy_pass http://$upstream:8084; include /etc/nginx/proxy_params; }
    location /api/v1/salary-structures       { set $upstream hrms-payroll; proxy_pass http://$upstream:8084; include /etc/nginx/proxy_params; }
    location /api/v1/payroll-item-definitions { set $upstream hrms-payroll; proxy_pass http://$upstream:8084; include /etc/nginx/proxy_params; }

    # HR05 Insurance
    location /api/v1/insurance { set $upstream hrms-insurance; proxy_pass http://$upstream:8085; include /etc/nginx/proxy_params; }

    # HR06 Project
    location /api/v1/projects  { set $upstream hrms-project; proxy_pass http://$upstream:8086; include /etc/nginx/proxy_params; }
    location /api/v1/customers { set $upstream hrms-project; proxy_pass http://$upstream:8086; include /etc/nginx/proxy_params; }
    location /api/v1/tasks     { set $upstream hrms-project; proxy_pass http://$upstream:8086; include /etc/nginx/proxy_params; }

    # HR07 Timesheet
    location /api/v1/timesheets { set $upstream hrms-timesheet; proxy_pass http://$upstream:8087; include /etc/nginx/proxy_params; }

    # HR08 Performance
    location /api/v1/performance { set $upstream hrms-performance; proxy_pass http://$upstream:8088; include /etc/nginx/proxy_params; }

    # HR09 Recruitment
    location /api/v1/recruitment { set $upstream hrms-recruitment; proxy_pass http://$upstream:8089; include /etc/nginx/proxy_params; }
    location /api/v1/candidates  { set $upstream hrms-recruitment; proxy_pass http://$upstream:8089; include /etc/nginx/proxy_params; }

    # HR10 Training
    location /api/v1/training { set $upstream hrms-training; proxy_pass http://$upstream:8090; include /etc/nginx/proxy_params; }

    # HR11 Workflow
    location /api/v1/workflows { set $upstream hrms-workflow; proxy_pass http://$upstream:8091; include /etc/nginx/proxy_params; }

    # HR12 Notification
    location /api/v1/notifications { set $upstream hrms-notification; proxy_pass http://$upstream:8092; include /etc/nginx/proxy_params; }

    # HR13 Document
    location /api/v1/documents { set $upstream hrms-document; proxy_pass http://$upstream:8093; include /etc/nginx/proxy_params; }

    # HR14 Reporting
    location /api/v1/reporting { set $upstream hrms-reporting; proxy_pass http://$upstream:8094; include /etc/nginx/proxy_params; }

    # ===== 前端 SPA =====
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
